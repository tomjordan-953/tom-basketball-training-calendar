<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cs-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="cs-stroke" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7" />
    </linearGradient>
  </defs>
  <!-- Rounded badge -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#cs-bg)" />
  <rect x="2" y="2" width="60" height="60" rx="16" fill="rgba(0,0,0,0.18)" />
  <!-- Outer ring (sight / target) -->
  <circle cx="32" cy="32" r="22" stroke="url(#cs-stroke)" stroke-width="2.5" />
  <!-- Inner basketball seams forming a stylised "C" arc -->
  <path d="M44 18a18 18 0 1 0 0 28" stroke="url(#cs-stroke)" stroke-width="3.5" stroke-linecap="round" fill="none" />
  <!-- Crosshair tick marks -->
  <line x1="32" y1="6" x2="32" y2="11" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round" />
  <line x1="32" y1="53" x2="32" y2="58" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round" />
  <line x1="6" y1="32" x2="11" y2="32" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round" />
  <line x1="53" y1="32" x2="58" y2="32" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" stroke-linecap="round" />
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="rgba(255,255,255,0.95)" />
</svg>
